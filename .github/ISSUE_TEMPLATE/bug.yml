name: 🐞 Bug
description: 테스트 중 발생한 문제를 추적하기 위해 사용합니다.
title: "🐞 Bug: "
labels: ["🐞 Bug"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 📄 증상 설명
      placeholder: 예) 피드 새로고침 시 앱이 종료됩니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔍 재현 절차
      placeholder: |
        1. 로그인 후 피드 진입
        2. 화면을 아래로 당김
        3. Crash 발생
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 🛠 테스트 환경
      placeholder: 예) iPhone 15, iOS 17.4
    validations:
      required: false
