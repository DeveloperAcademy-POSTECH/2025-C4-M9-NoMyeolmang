name: 🧹 Chore
description: 반복적이거나 유지보수를 위한 작업에 사용합니다.
title: "🧹 Chore: "
labels: ["🧹 Chore"]
body:
  - type: textarea
    id: description
    attributes:
      label: 📝 작업 설명
      placeholder: 예) 사용하지 않는 파일 삭제, 로그 정리 등
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 📋 작업 내용
      placeholder: |
        - [ ] 필요 없는 코드 제거
        - [ ] 주석 정리
      value: "- [ ] "
    validations:
      required: true
      
  - type: input
    id: branch
    attributes:
      label: 🌿 작업 브랜치 (선택)
      description: 이 작업을 진행할 브랜치명을 작성해주세요.
      placeholder: "예) chore/#55/remove-unused-logs"
    validations:
      required: false
