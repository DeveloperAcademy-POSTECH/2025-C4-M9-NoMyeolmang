# SwiftLint 설정 파일
#
# Updated by Moo on 8/30/25.

included:
  - NoMyeolmang/Sources

excluded:
  - NoMyeolmang.xcodeproj
  - NoMyeolmang/Resources
  - "*.entitlements"
  - .git

disabled_rules:
  - todo
  - trailing_whitespace
  - multiple_closures_with_trailing_closure


opt_in_rules:
  - force_unwrapping
  - sorted_imports

analyzer_rules:
  - unused_declaration
  - unused_import

line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
